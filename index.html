<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#08060E;--ink2:#100E1A;--ink3:#1A1726;--ink4:#241F32;--ink5:#2E2840;
  --gold:#F5A623;--gold2:#E8960F;--gd:rgba(245,166,35,.12);--gb:rgba(245,166,35,.28);
  --cyan:#00D4FF;--cd:rgba(0,212,255,.1);--cb:rgba(0,212,255,.25);
  --rose:#FF4B6E;--rd:rgba(255,75,110,.1);--rb:rgba(255,75,110,.25);
  --lime:#39D98A;--ld:rgba(57,217,138,.1);--lb:rgba(57,217,138,.25);
  --w:#F8F4FF;--mu:#7C748F;--fa:#3D3650;
  --sans:'DM Sans',sans-serif;--disp:'Syne',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--ink)}
body{font-family:var(--sans);color:var(--w);-webkit-font-smoothing:antialiased}
#root{height:100%;max-width:430px;margin:0 auto;display:flex;flex-direction:column;position:relative}
.sa{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}
.sa::-webkit-scrollbar{width:0}
.pv{display:none}.pv.on{display:block;animation:fi .3s cubic-bezier(.22,1,.36,1) both}
@keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--ink3);border:1px solid var(--fa);border-radius:18px}
.cg{border-color:var(--gb);box-shadow:0 0 20px rgba(245,166,35,.07)}
.cl{border-color:var(--lb);box-shadow:0 0 20px rgba(57,217,138,.07)}
.cr{border-color:var(--rb);box-shadow:0 0 20px rgba(255,75,110,.07)}
.cc{border-color:var(--cb);box-shadow:0 0 20px rgba(0,212,255,.07)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.tg{background:var(--gd);border:1px solid var(--gb);color:var(--gold)}
.tc{background:var(--cd);border:1px solid var(--cb);color:var(--cyan)}
.tl{background:var(--ld);border:1px solid var(--lb);color:var(--lime)}
.tr{background:var(--rd);border:1px solid var(--rb);color:var(--rose)}
.tf{background:var(--ink4);border:1px solid var(--fa);color:var(--mu)}
.btn{cursor:pointer;font-family:var(--sans);font-weight:600;border:none;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn:active{transform:scale(.97)}
.bg{background:var(--gold);color:#000;border-radius:13px}
.bgh{background:var(--ink4);border:1px solid var(--fa);color:var(--w);border-radius:13px}
.br{background:var(--rd);border:1px solid var(--rb);color:var(--rose);border-radius:13px}
.sl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.sep{height:1px;background:var(--fa);margin:10px 0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ps{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.6}}
@keyframes gp{0%,100%{box-shadow:0 0 0 0 rgba(57,217,138,.4)}50%{box-shadow:0 0 0 9px rgba(57,217,138,0)}}
@keyframes su{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes tk{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes dash{0%{stroke-dashoffset:226}100%{stroke-dashoffset:0}}
@keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.sp{animation:spin 1s linear infinite}
.pu{animation:ps 1.5s ease infinite}
.gw{animation:gp 1.8s ease infinite}
.tk{animation:tk 1s ease infinite}
.rbar{height:5px;background:var(--ink4);border-radius:3px;overflow:hidden}
.rf{height:100%;border-radius:3px;transition:width 1.4s cubic-bezier(.22,1,.36,1)}
.nb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;background:rgba(8,6,14,.94);backdrop-filter:blur(22px);border-top:1px solid var(--fa);padding:8px 4px 20px;display:flex;justify-content:space-around}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 10px;cursor:pointer;border-radius:11px;transition:background .2s;min-width:52px}
.ni.a{background:var(--gd)}
.ni i{font-size:17px;color:var(--mu);transition:color .2s}
.ni.a i{color:var(--gold)}
.nl{font-size:9px;font-weight:700;color:var(--mu);letter-spacing:.4px;text-transform:uppercase;transition:color .2s}
.ni.a .nl{color:var(--gold)}
.nd{position:absolute;top:1px;right:1px;width:6px;height:6px;background:var(--rose);border-radius:50%;border:1.5px solid var(--ink)}
.inp{background:var(--ink4);border:1px solid var(--fa);border-radius:11px;padding:12px 15px;font-size:14px;color:var(--w);font-family:var(--sans);width:100%;outline:none}
.inp:focus{border-color:var(--gb)}
.ph{display:sticky;top:0;z-index:50;background:var(--ink2);border-bottom:1px solid var(--fa);padding:16px 20px}
.sb{font-size:22px;font-weight:800;letter-spacing:-.5px;font-family:var(--disp)}
.mm{background:var(--ink4);border-radius:16px;height:155px;position:relative;overflow:hidden;border:1px solid var(--fa)}
.mg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:22px 22px}
.cb2{padding:11px 14px;border-radius:13px;font-size:13px;line-height:1.6;max-width:88%}
.ci{background:var(--ink4);border-radius:13px 13px 13px 4px}
.co{background:var(--gd);border:1px solid var(--gb);border-radius:13px 13px 4px 13px}
.lb{padding:5px 9px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--fa);background:var(--ink4);color:var(--mu);transition:all .15s}
.lb.a{background:var(--gd);border-color:var(--gb);color:var(--gold)}
.gb2{background-image:linear-gradient(var(--fa) 1px,transparent 1px),linear-gradient(90deg,var(--fa) 1px,transparent 1px);background-size:28px 28px}
</style>
</head>
