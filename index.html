<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ZeroLoss — AI Parametric Insurance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Space Grotesk', sans-serif; background: #0A0E1A; color: #F1F5F9; margin: 0; padding: 0; overflow-x: hidden; }
    :root {
      --orange: #F97316; --orange-dim: rgba(249,115,22,0.15); --orange-border: rgba(249,115,22,0.35);
      --green: #22C55E; --green-dim: rgba(34,197,94,0.12); --green-border: rgba(34,197,94,0.35);
      --red: #EF4444; --red-dim: rgba(239,68,68,0.12); --red-border: rgba(239,68,68,0.35);
      --yellow: #EAB308; --blue: #3B82F6;
      --surface: #111827; --surface2: #1C2333; --surface3: #243044;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
      --text: #F1F5F9; --text2: #94A3B8; --text3: #4B5563;
    }

    .page { display: none; animation: pageIn 0.35s cubic-bezier(0.16,1,0.3,1) both; }
    .page.active { display: block; }
    @keyframes pageIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

    .glass { background: rgba(255,255,255,0.04); border: 1px solid var(--border2); backdrop-filter: blur(12px); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
    .card-hover:active { transform: scale(0.98); transition: transform 0.15s; }

    .btn-primary { background: var(--orange); color: white; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s; }
    .btn-primary:active { background: #EA580C; transform: scale(0.98); }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); cursor: pointer; transition: all 0.2s; }
    .btn-ghost:active { transform: scale(0.97); }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-live { background: var(--green); animation: pulse-dot 1.4s infinite; }
    @keyframes pulse-dot { 0%,100%{ box-shadow: 0 0 0 0 rgba(34,197,94,0.5); } 50%{ box-shadow: 0 0 0 5px rgba(34,197,94,0); } }

    .risk-bar { height: 6px; border-radius: 3px; background: var(--surface3); overflow: hidden; }
    .risk-fill { height: 100%; border-radius: 3px; transition: width 1.5s cubic-bezier(0.16,1,0.3,1); }

    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bounce { animation: bounce-y 1s ease infinite; }
    @keyframes bounce-y { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-6px); } }
    .flash-red { animation: flash 0.8s infinite; }
    @keyframes flash { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
    .ping { position: relative; }
    .ping::after { content:''; position:absolute; inset:-5px; border-radius:50%; border:1.5px solid var(--green); animation: ping-ring 1.4s ease-out infinite; }
    @keyframes ping-ring { 0%{ transform:scale(1);opacity:1; } 100%{ transform:scale(1.8);opacity:0; } }

    .step-line { width: 1px; background: var(--border2); margin: 0 auto; flex-shrink:0; }
    .mono { font-family: 'Courier New', monospace; }

    /* shimmer loader */
    .shimmer { background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%); background-size: 200%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0%{ background-position:200% 0; } 100%{ background-position:-200% 0; } }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    /* tag pills */
    .tag { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:0.3px; }
    .tag-orange { background:var(--orange-dim); border:1px solid var(--orange-border); color:var(--orange); }
    .tag-green { background:var(--green-dim); border:1px solid var(--green-border); color:var(--green); }
    .tag-red { background:var(--red-dim); border:1px solid var(--red-border); color:var(--red); }
    .tag-gray { background:var(--surface2); border:1px solid var(--border2); color:var(--text2); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── helpers ── */
const Chevron = () => <i className="fa-solid fa-chevron-left" style={{fontSize:14}} />;
const Spinner = ({size=28, color='var(--orange)'}) => (
  <i className="fa-solid fa-circle-notch spin" style={{fontSize:size, color}} />
);

/* ══════════════════════════════════════════
   PAGE 1 — LANDING
═══════════════════════════════════════════ */
const Landing = ({ go }) => (
  <div className="page active" style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>
    {/* Top stripe */}
    <div style={{background:'var(--orange-dim)', borderBottom:'1px solid var(--orange-border)', padding:'8px 20px', display:'flex', justifyContent:'center'}}>
      <span style={{fontSize:11, color:'var(--orange)', fontWeight:600, letterSpacing:1}}>GUIDEWIRE DEVTRAILS 2026 — LIVE PROTOTYPE</span>
    </div>

    <div style={{flex:1, padding:'32px 24px 24px', display:'flex', flexDirection:'column'}}>
      {/* Logo */}
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:40}}>
        <div style={{width:44,height:44, background:'var(--orange)', borderRadius:12, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:800, fontSize:16, color:'white', letterSpacing:-0.5}}>ZL</div>
        <div>
          <div style={{fontWeight:800, fontSize:22, letterSpacing:-0.8}}>Zero<span style={{color:'var(--orange)'}}>Loss</span></div>
          <div style={{fontSize:11, color:'var(--text2)', marginTop:-2}}>AI Parametric Insurance</div>
        </div>
      </div>

      {/* Hero */}
      <div style={{marginBottom:32}}>
        <div style={{fontSize:36, fontWeight:800, letterSpacing:-1.5, lineHeight:1.15, marginBottom:14}}>
          Income <span style={{color:'var(--orange)'}}>never</span> goes to zero.
        </div>
        <div style={{fontSize:15, color:'var(--text2)', lineHeight:1.7}}>
          Rain too heavy to deliver? Curfew active? AQI spiked?<br/>
          ZeroLoss detects it and pays you <strong style={{color:'var(--text)'}}>automatically</strong> — no forms, no waiting.
        </div>
      </div>

      {/* Story card */}
      <div className="card" style={{padding:'18px 20px', marginBottom:28, borderLeft:'3px solid var(--orange)', borderRadius:'0 16px 16px 0', background:'var(--surface)'}}>
        <div style={{fontSize:13, color:'var(--text2)', lineHeight:1.75, fontStyle:'italic'}}>
          "Bhaiya, niklo toh accident ka darr, mat niklo toh ghar ka kiraya kaun bharega."
        </div>
        <div style={{fontSize:11, color:'var(--text3)', marginTop:8}}>— Arjun, Zomato delivery partner, Bangalore</div>
      </div>

      {/* Stats row */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:28}}>
        {[['15M', 'Gig workers'], ['₹0', 'Protection today'], ['8 sec', 'To payout']].map(([v,l]) => (
          <div key={l} className="card" style={{padding:'14px 12px', textAlign:'center'}}>
            <div style={{fontSize:18, fontWeight:800, color: v==='₹0'?'var(--red)': v==='8 sec'?'var(--green)':'var(--orange)'}}>{v}</div>
            <div style={{fontSize:10, color:'var(--text2)', marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>

      {/* How it works */}
      <div style={{marginBottom:32}}>
        {[
          ['fa-user-plus','Register your zone','2-min onboarding','var(--blue)'],
          ['fa-brain','AI risk assessment','XGBoost scores your location risk','var(--orange)'],
          ['fa-rupee-sign','Pay ₹35–₹118/week','Auto-renewed every Monday','var(--yellow)'],
          ['fa-bolt','Auto payout on disruption','Rain, flood, AQI, curfew — all covered','var(--green)'],
        ].map(([icon,title,sub,color],i,arr) => (
          <div key={title} style={{display:'flex', gap:14, alignItems:'flex-start'}}>
            <div style={{display:'flex', flexDirection:'column', alignItems:'center', flexShrink:0}}>
              <div style={{width:36,height:36, borderRadius:10, background:`rgba(${color==='var(--blue)'?'59,130,246':color==='var(--orange)'?'249,115,22':color==='var(--yellow)'?'234,179,8':'34,197,94'},0.15)`, border:`1px solid rgba(${color==='var(--blue)'?'59,130,246':color==='var(--orange)'?'249,115,22':color==='var(--yellow)'?'234,179,8':'34,197,94'},0.3)`, display:'flex', alignItems:'center', justifyContent:'center', color}}>
                <i className={`fa-solid ${icon}`} style={{fontSize:14}} />
              </div>
              {i<arr.length-1 && <div className="step-line" style={{height:24, width:1, marginTop:4}} />}
            </div>
            <div style={{paddingBottom: i<arr.length-1?20:0}}>
              <div style={{fontSize:14, fontWeight:600}}>{title}</div>
              <div style={{fontSize:12, color:'var(--text2)', marginTop:2}}>{sub}</div>
            </div>
          </div>
        ))}
      </div>

      <button className="btn-primary" style={{width:'100%', padding:'17px', borderRadius:14, fontSize:17}} onClick={() => go('register')}>
        See How It Works &nbsp;<i className="fa-solid fa-arrow-right" />
      </button>
    </div>
  </div>
);

/* ══════════════════════════════════════════
   PAGE 2 — REGISTRATION
═══════════════════════════════════════════ */
const Register = ({ go }) => {
  const [step, setStep] = useState(0); // 0=form 1=scanning 2=done

  const scan = () => {
    setStep(1);
    setTimeout(() => setStep(2), 2800);
    setTimeout(() => go('dashboard'), 4200);
  };

  const checks = [
    'Analyzing flood zone history...',
    'Fetching AQI trend data...',
    'Scoring monsoon overlap...',
    'Calculating platform risk...',
    'Finalizing premium...',
  ];
  const [checkIdx, setCheckIdx] = useState(0);
  useEffect(() => {
    if (step !== 1) return;
    const t = setInterval(() => setCheckIdx(i => i < checks.length-1 ? i+1 : i), 500);
    return () => clearInterval(t);
  }, [step]);

  return (
    <div className="page active" style={{minHeight:'100vh', background:'var(--surface)', padding:'20px 24px 32px'}}>
      <button className="btn-ghost" style={{padding:'8px 14px', borderRadius:10, fontSize:13, marginBottom:24, display:'flex', alignItems:'center', gap:8}} onClick={() => go('landing')}>
        <Chevron /> Back
      </button>

      {step === 0 && <>
        <div style={{marginBottom:28}}>
          <div style={{fontSize:11, color:'var(--orange)', fontWeight:700, letterSpacing:1, marginBottom:6}}>STEP 1 OF 3</div>
          <div style={{fontSize:24, fontWeight:800, letterSpacing:-0.8}}>Create your policy</div>
          <div style={{fontSize:13, color:'var(--text2)', marginTop:4}}>Takes 2 minutes. Covers you from next Monday.</div>
        </div>

        {[
          ['Full Name','text','Arjun Kumar'],
          ['Phone Number','tel','+91 98765 43210'],
          ['Average Daily Income (₹)','number','1000'],
        ].map(([label, type, val]) => (
          <div key={label} style={{marginBottom:14}}>
            <div style={{fontSize:11, color:'var(--text2)', fontWeight:600, marginBottom:6, textTransform:'uppercase', letterSpacing:0.5}}>{label}</div>
            <div style={{background:'var(--surface2)', border:'1px solid var(--border2)', borderRadius:10, padding:'13px 16px', fontSize:15, color:'var(--text)', fontWeight:500}}>
              {val}
            </div>
          </div>
        ))}

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11, color:'var(--text2)', fontWeight:600, marginBottom:6, textTransform:'uppercase', letterSpacing:0.5}}>City & Zone</div>
          <div style={{background:'var(--surface2)', border:'1px solid var(--orange-border)', borderRadius:10, padding:'13px 16px', fontSize:15, color:'var(--text)', fontWeight:500, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            Bangalore — Koramangala
            <span className="tag tag-orange">Flood Zone B</span>
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11, color:'var(--text2)', fontWeight:600, marginBottom:6, textTransform:'uppercase', letterSpacing:0.5}}>Delivery Platform</div>
          <div style={{display:'flex', gap:8}}>
            {['Zomato','Swiggy'].map(p => (
              <div key={p} style={{flex:1, background:'var(--orange-dim)', border:'1px solid var(--orange-border)', borderRadius:10, padding:'12px', textAlign:'center', fontSize:13, fontWeight:600, color:'var(--orange)'}}>
                <i className="fa-solid fa-check" style={{marginRight:6}} />{p}
              </div>
            ))}
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11, color:'var(--text2)', fontWeight:600, marginBottom:6, textTransform:'uppercase', letterSpacing:0.5}}>UPI ID</div>
          <div style={{background:'var(--surface2)', border:'1px solid var(--border2)', borderRadius:10, padding:'13px 16px', fontSize:14, color:'var(--text)', fontFamily:'monospace'}}>
            arjun.kumar@upi
          </div>
        </div>

        <button className="btn-primary" style={{width:'100%', padding:'17px', borderRadius:14, fontSize:16, marginTop:20}} onClick={scan}>
          <i className="fa-solid fa-brain" style={{marginRight:8}} />Calculate AI Premium
        </button>
      </>}

      {step === 1 && (
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'70vh', gap:24}}>
          <div style={{position:'relative', width:80, height:80}}>
            <div style={{position:'absolute', inset:0, borderRadius:'50%', background:'var(--orange-dim)', border:'2px solid var(--orange-border)', display:'flex', alignItems:'center', justifyContent:'center'}}>
              <i className="fa-solid fa-brain" style={{fontSize:30, color:'var(--orange)'}} />
            </div>
            <svg style={{position:'absolute', inset:0, width:80, height:80}} viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="37" fill="none" stroke="var(--orange)" strokeWidth="2" strokeLinecap="round" strokeDasharray="232" style={{animation:'dash 1.5s linear infinite'}} />
            </svg>
            <style>{`@keyframes dash{0%{stroke-dashoffset:232}100%{stroke-dashoffset:0}}`}</style>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:20, fontWeight:800, marginBottom:8}}>Running XGBoost Model</div>
            <div style={{fontSize:13, color:'var(--text2)'}}>Analyzing 14 risk factors for your zone</div>
          </div>
          <div className="card" style={{width:'100%', padding:'16px 20px'}}>
            {checks.map((c, i) => (
              <div key={c} style={{display:'flex', alignItems:'center', gap:10, padding:'7px 0', borderBottom: i<checks.length-1?'1px solid var(--border)':'none'}}>
                <div style={{width:16, height:16, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center'}}>
                  {i < checkIdx ? <i className="fa-solid fa-check" style={{fontSize:11, color:'var(--green)'}} /> :
                   i === checkIdx ? <i className="fa-solid fa-circle-notch spin" style={{fontSize:11, color:'var(--orange)'}} /> :
                   <div style={{width:6, height:6, borderRadius:'50%', background:'var(--border2)'}} />}
                </div>
                <span style={{fontSize:13, color: i<=checkIdx?'var(--text)':'var(--text3)'}}>{c}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {step === 2 && (
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'70vh', gap:20}}>
          <div className="ping" style={{width:70, height:70, borderRadius:'50%', background:'var(--green-dim)', border:'2px solid var(--green)', display:'flex', alignItems:'center', justifyContent:'center'}}>
            <i className="fa-solid fa-check" style={{fontSize:28, color:'var(--green)'}} />
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:22, fontWeight:800, color:'var(--green)'}}>Risk Score: 68/100</div>
            <div style={{fontSize:13, color:'var(--text2)', marginTop:4}}>Medium-High · Flood Zone B confirmed</div>
          </div>
          <div className="card" style={{width:'100%', padding:'20px', textAlign:'center'}}>
            <div style={{fontSize:12, color:'var(--text2)', marginBottom:6}}>YOUR WEEKLY PREMIUM</div>
            <div style={{fontSize:56, fontWeight:800, color:'var(--orange)', letterSpacing:-2}}>₹64</div>
            <div style={{fontSize:13, color:'var(--text2)'}}>covers up to <strong style={{color:'var(--text)'}}>₹4,000/week</strong> income loss</div>
            <div style={{marginTop:16, fontSize:12, color:'var(--text3)'}}>Less than ₹10 per day · Activates next Monday</div>
          </div>
          <Spinner size={22} color="var(--orange)" /> <span style={{fontSize:13, color:'var(--text2)'}}>Activating policy…</span>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════
   PAGE 3 — WORKER DASHBOARD
═══════════════════════════════════════════ */
const Dashboard = ({ go, weather, onSimulate, claimStatus }) => {
  const triggered = weather.rain > 50;

  return (
    <div className="page active" style={{minHeight:'100vh', background:'#0A0E1A', paddingBottom:100}}>
      {/* Header */}
      <div style={{background:'var(--surface)', borderBottom:'1px solid var(--border)', padding:'16px 20px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <div style={{fontSize:11, color:'var(--text2)', marginBottom:2}}>Welcome back,</div>
            <div style={{fontSize:20, fontWeight:800}}>Arjun Kumar <span style={{fontSize:13, color:'var(--text2)', fontWeight:400}}>· Zomato</span></div>
          </div>
          <button className="btn-ghost" style={{padding:'8px 14px', borderRadius:10, fontSize:12, display:'flex', alignItems:'center', gap:6}} onClick={() => go('admin')}>
            <i className="fa-solid fa-shield-halved" style={{fontSize:11}} /> Admin
          </button>
        </div>
      </div>

      <div style={{padding:'20px'}}>
        {/* Policy Card */}
        <div style={{background:'linear-gradient(135deg,#1a2238 0%,#0d1a2d 100%)', border:'1px solid var(--orange-border)', borderRadius:20, padding:'20px', marginBottom:16, position:'relative', overflow:'hidden'}}>
          <div style={{position:'absolute', top:-20, right:-20, width:120, height:120, borderRadius:'50%', background:'var(--orange-dim)', filter:'blur(30px)'}} />
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16, position:'relative'}}>
            <div>
              <div style={{fontSize:11, color:'var(--text2)', marginBottom:4}}>ACTIVE POLICY</div>
              <div className="tag tag-green" style={{marginBottom:8}}><div className="status-dot dot-live" />Protected</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:11, color:'var(--text2)'}}>premium</div>
              <div style={{fontSize:18, fontWeight:800}}>₹64<span style={{fontSize:12, color:'var(--text2)', fontWeight:400}}>/wk</span></div>
            </div>
          </div>
          <div style={{position:'relative'}}>
            <div style={{fontSize:11, color:'var(--text2)', marginBottom:4}}>WEEKLY COVERAGE</div>
            <div style={{fontSize:44, fontWeight:800, letterSpacing:-2, color:'var(--green)'}}>₹4,000</div>
            <div style={{fontSize:12, color:'var(--text2)', marginTop:4}}>Policy ZL-2026-BLR-07423 · expires Sun 23 Mar</div>
          </div>
        </div>

        {/* Live Zone */}
        <div style={{fontSize:13, fontWeight:700, color:'var(--text2)', marginBottom:10, textTransform:'uppercase', letterSpacing:0.8}}>Live Zone Conditions</div>

        <div className="card" style={{padding:'18px', marginBottom:12, borderColor: triggered?'var(--red-border)':'var(--border)'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
            <div>
              <div style={{fontSize:11, color:'var(--text2)', marginBottom:4}}>PRECIPITATION (3HR)</div>
              <div style={{fontSize:32, fontWeight:800, letterSpacing:-1, color: triggered?'var(--red)':'var(--blue)'}}>
                {weather.rain}<span style={{fontSize:16, color:'var(--text2)', fontWeight:400}}>mm</span>
              </div>
            </div>
            <div style={{fontSize:40, color: triggered?'var(--red)':'var(--blue)'}}>
              <i className={`fa-solid ${triggered?'fa-cloud-showers-heavy bounce':'fa-cloud-sun'}`} />
            </div>
          </div>
          <div className="risk-bar">
            <div className="risk-fill" style={{width:`${Math.min((weather.rain/65)*100,100)}%`, background: triggered?'var(--red)':'var(--blue)'}} />
          </div>
          <div style={{display:'flex', justifyContent:'space-between', marginTop:6}}>
            <span style={{fontSize:11, color:'var(--text3)'}}>Threshold: 50mm</span>
            {triggered && <span style={{fontSize:11, color:'var(--red)', fontWeight:700}} className="flash-red">EXCEEDED</span>}
          </div>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:16}}>
          <div className="card" style={{padding:'14px'}}>
            <div style={{fontSize:11, color:'var(--text2)', marginBottom:4}}>AQI INDEX</div>
            <div style={{fontSize:24, fontWeight:800, color: weather.aqi>300?'var(--red)':weather.aqi>150?'var(--yellow)':'var(--green)'}}>
              {weather.aqi}
            </div>
            <div style={{fontSize:11, color:'var(--text2)', marginTop:2}}>{weather.aqi>300?'Hazardous':weather.aqi>150?'Unhealthy':'Moderate'}</div>
          </div>
          <div className="card" style={{padding:'14px'}}>
            <div style={{fontSize:11, color:'var(--text2)', marginBottom:4}}>WIND SPEED</div>
            <div style={{fontSize:24, fontWeight:800, color: weather.rain>50?'var(--red)':'var(--text)'}}>
              {weather.rain>50?62:18}<span style={{fontSize:13, fontWeight:400, color:'var(--text2)'}}> km/h</span>
            </div>
            <div style={{fontSize:11, color:'var(--text2)', marginTop:2}}>{weather.rain>50?'Dangerous':'Normal'}</div>
          </div>
        </div>

        {/* Simulate button */}
        {!claimStatus && !triggered && (

/* ══════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState('landing');
  const [weather, setWeather] = useState({ rain: 12, aqi: 110 });
  const [claimStatus, setClaimStatus] = useState(null);
  const [fraudAttack, setFraudAttack] = useState(false);

  const simulateRain = () => {
    setWeather({ rain: 65, aqi: 187 });
    setClaimStatus('checking');
    setTimeout(() => setClaimStatus('approved'), 3200);
  };

  const go = (p) => {
    setPage(null);
    setTimeout(() => setPage(p), 50);
  };

  return (
    <div style={{maxWidth:480, margin:'0 auto', minHeight:'100vh', position:'relative'}}>
      {page === 'landing'    && <Landing go={go} />}
      {page === 'register'   && <Register go={go} />}
      {page === 'dashboard'  && <Dashboard go={go} weather={weather} onSimulate={simulateRain} claimStatus={claimStatus} />}
      {page === 'admin'      && <Admin go={go} fraudAttack={fraudAttack} onMarketCrash={() => setFraudAttack(true)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
